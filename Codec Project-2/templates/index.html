<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service Chatbot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🤖 Customer Service Chatbot</h1>

    <p>Ask any customer support question.</p>

    <form method="POST">

        <input
            type="text"
            name="message"
            placeholder="Enter your question..."
            required
        >

        <button type="submit">
            Send
        </button>

    </form>

    {% if response %}

    <div class="chatbox">

        <h3>Bot Response</h3>

        <p>{{ response }}</p>

    </div>

    {% endif %}

</div>

</body>
</html>
